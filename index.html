<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSakay - Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #0a0f1e;
            color: white;
            font-family: Arial, sans-serif;
        }

        .box {
            background-color: rgba(0, 30, 60, 0.85);
            border: 1px solid #0077cc;
            border-radius: 10px;
            padding: 30px;
            max-width: 450px;
            margin: 40px auto;
        }

        h1 {
            text-align: center;
            letter-spacing: 4px;
            color: #c0dff0;
        }

        label {
            font-size: 13px;
            color: #8aaec8;
        }

        input[type="text"],
        input[type="number"],
        input[type="password"],
        input[type="file"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 12px;
            background-color: #0d1f35;
            border: 1px solid #0077cc;
            border-radius: 5px;
            color: white;
        }

        .photo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 3px solid #0077cc;
            display: block;
            margin: 0 auto 10px;
            object-fit: cover;
        }

        .btn-submit {
            width: 100%;
            background-color: #0077cc;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-size: 15px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .btn-cancel {
            width: 100%;
            background-color: transparent;
            color: #8aaec8;
            border: 1px solid #8aaec8;
            padding: 9px;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
        }

        footer {
            text-align: center;
            padding: 15px;
            font-size: 13px;
            color: #5a7a90;
            margin-top: 20px;
            border-top: 1px solid #0077cc;
        }

        footer a {
            color: #5a7a90;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-dark" style="background-color: #060b18; padding: 10px 20px;">
        <span class="navbar-brand">MAXIM 😂</span>
        <span class="text-secondary me-auto ms-3">
            <a href="#" class="text-secondary text-decoration-none me-3">Home</a>
            <a href="#" class="text-secondary text-decoration-none me-3">Fare Matrix</a>
            <a href="#" class="text-secondary text-decoration-none me-3">Schedule</a>
            <a href="#" class="text-secondary text-decoration-none">Help</a>
        </span>
        <button class="btn btn-outline-secondary btn-sm me-2">Book Now</button>
        <button class="btn btn-primary btn-sm">Create Account</button>
    </nav>

    <div class="box">

        <h1>REGISTRATION</h1>
        <br>

        <p style="color: #00aaff; font-size: 13px;"> Instructions</p>
        <p style="font-size: 13px; color: #8aaec8;">Please fill out all required fields and click Submit to finish your registration.</p>

        <br>

        <img id="profilePreview" src="https://i.pravatar.cc/150?img=47" class="photo" alt="Profile Photo">

        <input type="file" id="photoInput" accept="image/*">
        <button class="btn btn-primary btn-sm w-100 mb-3" onclick="uploadPhoto()">Upload Photo</button>

        <label>First Name</label>
        <input type="text" id="firstName" placeholder="First Name">

        <label>Last Name</label>
        <input type="text" id="lastName" placeholder="Last Name">

        <label>Age</label>
        <input type="number" id="age" placeholder="Age">

        <label>Contact Number</label>
        <input type="text" id="contact" placeholder="09XXXXXXXXX">

        <label>Username</label>
        <input type="text" id="username" placeholder="Username">

        <label>Password</label>
        <input type="password" id="password" placeholder="Password">

        <br>
        <input type="checkbox" id="terms">
        <label> I accept the Terms of Use and Privacy Policy</label>
        <br><br>

        <button class="btn-submit" onclick="submitForm()">Create my account</button>
        <button class="btn-cancel" onclick="cancelForm()">Cancel</button>

    </div>

    <footer>
        Student Name | Grade & Section &copy;2026 &nbsp;|&nbsp;
        <a href="https://www.w3schools.com" target="_blank">W3Schools</a>
    </footer>

    <script>

        function uploadPhoto() {
            var file = document.getElementById("photoInput").files[0];

            if (file) {
                var reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById("profilePreview").src = e.target.result;
                    alert("Your profile pic has been uploaded.");
                };
                reader.readAsDataURL(file);
            } else {
                alert("Please choose a photo first.");
            }
        }

        function submitForm() {
            var firstName = document.getElementById("firstName").value;
            var lastName = document.getElementById("lastName").value;
            var age = document.getElementById("age").value;
            var contact = document.getElementById("contact").value;
            var username = document.getElementById("username").value;
            var password = document.getElementById("password").value;
            var terms = document.getElementById("terms").checked;

            if (firstName == "" || lastName == "" || age == "" || contact == "" || username == "" || password == "") {
                alert("Please fill out all fields.");
                return;
            }

            if (age < 18) {
                alert("You must be at least 18 years old.");
                return;
            }

            if (terms == false) {
                alert("Please accept the Terms of Use and Privacy Policy.");
                return;
            }

            alert("Account created! Welcome, " + firstName + "!");
        }

        function cancelForm() {
            var confirmed = confirm("Are you sure you want to cancel?");

            if (confirmed == true) {
                document.getElementById("firstName").value = "";
                document.getElementById("lastName").value = "";
                document.getElementById("age").value = "";
                document.getElementById("contact").value = "";
                document.getElementById("username").value = "";
                document.getElementById("password").value = "";
                document.getElementById("terms").checked = false;
                document.getElementById("profilePreview").src = "https://i.pravatar.cc/150?img=47";
            }
        }

    </script>

</body>
</html>
